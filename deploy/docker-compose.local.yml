services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: waybills_local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:${LOCAL_POSTGRES_BIND_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d waybills_local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - waybills-local-postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend.local.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${LOCAL_BACKEND_BIND_PORT:-3001}:3001"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const response = await fetch('http://127.0.0.1:3001/health'); if (!response.ok) throw new Error('backend unhealthy')",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${LOCAL_VITE_API_BASE_URL:-http://127.0.0.1:3001}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${LOCAL_FRONTEND_BIND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  waybills-local-postgres-data:
