services:
  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
      target: runtime
    restart: unless-stopped
    env_file:
      - ./backend.env
    ports:
      - "127.0.0.1:${BACKEND_BIND_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      default:
      orcta_net:

  backend-ops:
    profiles:
      - ops
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
      target: ops
    env_file:
      - ./backend.env
    restart: "no"
    networks:
      default:
      orcta_net:

  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONTEND_BIND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default

networks:
  orcta_net:
    external: true
