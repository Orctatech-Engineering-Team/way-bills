name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/backend/node_modules
            apps/frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'apps/backend/package.json', 'apps/frontend/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Backend typecheck
        run: bun run --cwd apps/backend typecheck

      - name: Backend tests
        run: bun run --cwd apps/backend test

      - name: Frontend typecheck
        run: bun run --cwd apps/frontend typecheck

      - name: Frontend tests
        run: bun run --cwd apps/frontend test

      - name: Frontend build
        run: bun run --cwd apps/frontend build

  docker-build:
    name: Validate Docker Images
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          build-args: |
            VITE_API_BASE_URL=https://api.waybills.orctatech.com
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy To VPS
    runs-on: ubuntu-latest
    needs:
      - verify
      - docker-build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR }}"
            git fetch --all --prune
            git switch main
            git pull --ff-only origin main
            bash deploy/deploy.sh up
